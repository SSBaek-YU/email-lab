name: Update Scholar Stats

on:
  schedule:
    - cron: '0 3 * * 1' # every Monday 03:00 UTC
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch Scholar stats
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/update-scholar.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet src/data/scholar.json; then
            echo "No change in scholar stats."
          else
            git add src/data/scholar.json
            git commit -m "chore: update Google Scholar stats"
            git push
          fi
